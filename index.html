<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Quince - Maricel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Estilos Generales - Temática Cielo Estrellado y Galaxia */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Georgia', serif;
            background: radial-gradient(circle at center, #1a2639 0%, #05070a 100%);
            color: #ffffff;
            text-align: center;
            overflow-x: hidden;
        }

        .container {
            max-width: 450px;
            margin: 0 auto;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        /* Título Principal arriba */
        .subtitle {
            font-style: italic;
            color: #a4b3c6;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-top: 10px;
            margin-bottom: 5px;
        }

        /* Nombre con animación de entrada */
        h1 {
            font-size: 3.5rem;
            letter-spacing: 3px;
            color: #d4af37;
            margin-top: 0;
            margin-bottom: 20px;
            font-weight: 300;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1.5s ease-out forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Estilos del Reproductor de Música */
        .music-player {
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeIn 2s ease-out 0.5s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .music-btn {
            background: rgba(214, 175, 55, 0.1);
            border: 1px solid #d4af37;
            color: #d4af37;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            outline: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
            transition: all 0.3s ease;
        }

        .music-btn:hover {
            background: #d4af37;
            color: #05070a;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .music-text {
            font-size: 0.8rem;
            color: #a4b3c6;
            margin-top: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .quote {
            font-size: 1.1rem;
            line-height: 1.6;
            font-style: italic;
            color: #e2e8f0;
            margin: 30px 10px;
            padding: 0 10px;
        }

        /* Cuenta Regresiva */
        .countdown-title {
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #d4af37;
            margin-bottom: 15px;
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 12px;
            border-radius: 8px;
            min-width: 65px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .time-box span {
            font-size: 1.5rem;
            font-weight: bold;
            display: block;
            color: #ffffff;
        }

        .time-box small {
            font-size: 0.75rem;
            color: #a4b3c6;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Bloques de Información */
        .info-section {
            margin: 40px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px 0;
        }

        .info-section h3 {
            font-size: 1.3rem;
            letter-spacing: 2px;
            color: #ffffff;
            margin-bottom: 15px;
        }

        .info-section p {
            margin: 10px 0;
            color: #cbd5e1;
            font-size: 1rem;
        }

        /* Icono de ubicación */
        .location-icon {
            color: #d4af37;
            margin-right: 8px;
            font-size: 1.1rem;
        }

        /* Botón Ver Ubicación */
        .btn-location {
            display: inline-block;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            padding: 10px 22px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 15px;
            transition: all 0.3s ease;
        }

        .btn-location:hover {
            background: #ffffff;
            color: #05070a;
            border-color: #ffffff;
        }

        .dress-code {
            color: #ff7675 !important;
            font-weight: bold;
            margin-top: 25px !important;
            letter-spacing: 1px;
        }

        /* Sección de Regalos */
        .gift-section {
            background: rgba(214, 175, 55, 0.05);
            border: 1px solid rgba(214, 175, 55, 0.2);
            padding: 25px 20px;
            border-radius: 12px;
            margin: 40px 0;
        }

        .gift-section p {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #cbd5e1;
            margin-top: 0;
        }

        .alias {
            font-size: 1.3rem;
            letter-spacing: 2px;
            color: #d4af37;
            margin-top: 15px;
        }

        /* Botón de Confirmación */
        .btn-confirm {
            display: inline-block;
            background: #d4af37;
            color: #05070a;
            padding: 16px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            letter-spacing: 2px;
            font-size: 0.95rem;
            text-transform: uppercase;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(212, 175, 55, 0.5);
        }
    </style>
</head>
<body>

    <div class="container">
        <p class="subtitle">Mis Quince Años</p>
        <h1>Maricel</h1>
        
        <div class="music-player">
            <audio id="bg-music" loop>
                <source src="musica_15.mp3" type="audio/mpeg">
                Tu navegador no soporta este reproductor.
            </audio>
            <button class="music-btn" id="play-btn" onclick="toggleMusic()">▶</button>
            <div class="music-text" id="music-status">Escuchar Música</div>
        </div>

        <p class="quote">
            "Bajo un cielo lleno de estrellas, comparto esta noche con personas tan bellas.<br>
            Gracias por ser parte de mi ilusión y guardar este
